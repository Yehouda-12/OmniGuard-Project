apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: omniguard-frontend
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: omniguard-frontend
spec:
  source:
    type: Git
    git:
      uri: https://github.com/Yehouda-12/OmniGuard-Project.git
      ref: feature/israel
    contextDir: .
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: client/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: omniguard-frontend:latest
  triggers:
    - type: ConfigChange
    - type: ImageChange
